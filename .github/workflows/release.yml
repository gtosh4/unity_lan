name: Release

# Tag a release to trigger:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  # Dedicated release-signing PUBLIC key, baked into every client build in this workflow (read via
  # option_env! in `common::update::release_pubkey`) so auto-updates verify against it rather than any
  # guild signing key. Set the repo variable UNITYLAN_RELEASE_PUBKEY to the hex public key printed by
  # `unitylan-coordinator gen-release-key`; the private seed stays offline with the release operator.
  # Empty → builds are UNARMED and clients fall back to the legacy guild-signed update path.
  UNITYLAN_RELEASE_PUBKEY: ${{ vars.UNITYLAN_RELEASE_PUBKEY }}

permissions:
  contents: write   # attach .deb/.rpm to the GitHub Release
  packages: write   # push the coordinator image to GHCR

jobs:
  # Create the GitHub Release with notes lifted from CHANGELOG.md *before* any artifact attaches, so
  # the release page (and the Discord announce, which reads the body) always has real notes. Left to
  # itself, action-gh-release creates the release with an empty body. The build jobs below `needs`
  # this and attach files without a body, which action-gh-release preserves.
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish release notes from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # The section for this tag: lines from `## v<ver>` (prefix match, so a titled header like
          # `## v0.1.0 — first release` still matches) up to the next `## ` heading.
          awk -v v="## ${TAG}" 'index($0,v)==1{f=1;next} /^## /{f=0} f' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::warning::no CHANGELOG.md section for ${TAG}"
            printf 'Release %s\n' "$TAG" > notes.md
          fi
          # Idempotent: create on first run, edit on a re-run or a hand-created release.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file notes.md
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" \
              --notes-file notes.md --verify-tag
          fi

  # engine + desktop .deb/.rpm (amd64). For arm64, add a matrix building via `cross`.
  packages:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        # Include the release pubkey in the cache key: it's baked in at compile time, so a stale cache
        # from an unarmed (or differently-keyed) build must not be reused, or clients ship unarmed.
        with:
          key: relkey-${{ env.UNITYLAN_RELEASE_PUBKEY }}
      - name: Release-signing arm status
        run: |
          if [ -n "$UNITYLAN_RELEASE_PUBKEY" ]; then
            echo "release signing: ARMED (pubkey ${UNITYLAN_RELEASE_PUBKEY:0:16}…)"
          else
            echo "::warning::release signing UNARMED — clients fall back to the guild-signed update path"
          fi
      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update && sudo apt-get install -y nfpm
      - name: Build packages
        run: VERSION="${GITHUB_REF_NAME#v}" packaging/build.sh
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/*

  # Windows installer (.msi, x64) built with WiX — bundles the engine service + GUI + wireguard-nt —
  # plus the .tar.gz auto-update bundle (engine + GUI) the file-swap update path consumes.
  windows:
    needs: [release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: relkey-${{ env.UNITYLAN_RELEASE_PUBKEY }}
      - name: Release-signing arm status
        shell: bash
        run: |
          if [ -n "$UNITYLAN_RELEASE_PUBKEY" ]; then
            echo "release signing: ARMED (pubkey ${UNITYLAN_RELEASE_PUBKEY:0:16}…)"
          else
            echo "::warning::release signing UNARMED — clients fall back to the guild-signed update path"
          fi
      - name: Install WiX
        # Pinned: WiX v6+ requires accepting the Open Source Maintenance Fee EULA (WIX7015), and
        # unitylan.wxs targets the v4/v5 schema.
        run: dotnet tool install --global wix --version 5.0.2
      # Guard first, because the build step below deliberately does NOT pass -Version: letting
      # build.ps1 derive it is what keeps its own version detection exercised (that path read a
      # crate Cargo.toml that inherits `version.workspace = true`, so a bare local run died with a
      # null-index error — invisible here for as long as CI passed -Version explicitly). Deriving is
      # only safe once the tag and the workspace version are known to agree.
      - name: Check the workspace version matches the tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v', ''
          $m = Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $m) { throw "no [workspace.package] version in Cargo.toml" }
          $ws = $m.Matches[0].Groups[1].Value
          if ($ws -ne $tag) {
            throw "tag v$tag disagrees with [workspace.package] version $ws - bump Cargo.toml before tagging"
          }
          Write-Host "workspace version $ws matches tag"
      - name: Build MSI
        shell: pwsh
        run: packaging/windows/build.ps1
      # `wix build` defaults to x86, and in a 32-bit package the .wxs's ProgramFiles64Folder folds
      # to `C:\Program Files (x86)` - so a dropped `-arch x64` silently ships a 64-bit payload into
      # the 32-bit tree. That shipped in every release through v0.3.0 because nothing checked, and
      # the filename says x64 either way. Assert the package's real platform, not its name.
      - name: Verify the MSI is a 64-bit package
        shell: pwsh
        run: |
          $msi = Get-ChildItem packaging/dist/*.msi | Select-Object -First 1
          if (-not $msi) { throw "no .msi produced" }
          $inst = New-Object -ComObject WindowsInstaller.Installer
          $si = $inst.GetType().InvokeMember('SummaryInformation','GetProperty',$null,$inst,@($msi.FullName,0))
          $template = $si.GetType().InvokeMember('Property','GetProperty',$null,$si,@(7))
          Write-Host "$($msi.Name): Summary Information template = $template"
          if ($template -notmatch '^x64') {
            throw "MSI is not a 64-bit package (template '$template') - restore -arch x64 in packaging/windows/build.ps1"
          }
          # The version must survive into the package too, which is what proves the derive path
          # above actually worked rather than silently defaulting.
          $tag = $env:GITHUB_REF_NAME -replace '^v', ''
          $db = $inst.GetType().InvokeMember('OpenDatabase','InvokeMethod',$null,$inst,@($msi.FullName,0))
          $vw = $db.GetType().InvokeMember('OpenView','InvokeMethod',$null,$db,@("SELECT Value FROM Property WHERE Property = 'ProductVersion'"))
          $vw.GetType().InvokeMember('Execute','InvokeMethod',$null,$vw,@($null))
          $rec = $vw.GetType().InvokeMember('Fetch','InvokeMethod',$null,$vw,@())
          if (-not $rec) { throw "MSI has no ProductVersion property" }
          $pv = $rec.GetType().InvokeMember('StringData','GetProperty',$null,$rec,@(1))
          if ($pv -ne $tag) { throw "MSI ProductVersion '$pv' does not match tag '$tag'" }
          Write-Host "ProductVersion $pv matches tag"
      - name: Checksums
        shell: pwsh
        run: |
          Get-ChildItem packaging/dist/*.msi, packaging/dist/*.tar.gz | ForEach-Object {
            "$((Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower())  $($_.Name)"
          } | Set-Content packaging/dist/SHA256SUMS-windows.txt
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/dist/*.msi
            packaging/dist/unitylan-windows-x64.tar.gz
            packaging/dist/SHA256SUMS-windows.txt

  # coordinator Docker image -> ghcr.io/<owner>/unitylan-coordinator
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/coordinator.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/unitylan-coordinator:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/unitylan-coordinator:latest
          # image.source is what links the GHCR package to this repo (repo Packages sidebar,
          # "Source" link on the package page). Without it the package only shows on the profile.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

  # Announce the release in Discord #changelog once all artifacts are built and attached.
  announce:
    needs: [packages, windows, image]
    runs-on: ubuntu-latest
    steps:
      - name: Post release to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body 2>/dev/null || echo "")
          NOTES=${NOTES:-"Release $TAG"}
          DESC=$(jq -Rs '.[:4000]' <<< "$NOTES")
          curl -fsSL -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @- <<JSON
          {
            "username": "UnityLAN Releases",
            "embeds": [{
              "title": "$TAG",
              "url": "https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG",
              "description": $DESC,
              "color": 5793522
            }]
          }
          JSON
