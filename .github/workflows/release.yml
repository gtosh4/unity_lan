name: Release

# Tag a release to trigger:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write   # attach .deb/.rpm to the GitHub Release
  packages: write   # push the coordinator image to GHCR

jobs:
  # engine + desktop .deb/.rpm (amd64). For arm64, add a matrix building via `cross`.
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update && sudo apt-get install -y nfpm
      - name: Build packages
        run: VERSION="${GITHUB_REF_NAME#v}" packaging/build.sh
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/*

  # Windows installer (.msi, x64) built with WiX. Bundles the engine service + GUI + wireguard-nt.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install WiX
        run: dotnet tool install --global wix
      - name: Build MSI
        shell: pwsh
        run: packaging/windows/build.ps1 -Version ($env:GITHUB_REF_NAME -replace '^v', '')
      - name: Checksums
        shell: pwsh
        run: |
          Get-ChildItem packaging/dist/*.msi | ForEach-Object {
            "$((Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower())  $($_.Name)"
          } | Set-Content packaging/dist/SHA256SUMS-windows.txt
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/dist/*.msi
            packaging/dist/SHA256SUMS-windows.txt

  # coordinator Docker image -> ghcr.io/<owner>/unitylan-coordinator
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/coordinator.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/unitylan-coordinator:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/unitylan-coordinator:latest
