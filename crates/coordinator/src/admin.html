<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UnityLAN Coordinator</title>
<style>
  :root{
    color-scheme: light dark;
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1a1c1f; --muted:#6b7280;
    --line:#e5e7eb; --accent:#4f46e5; --ok:#16a34a; --okbg:#16a34a1a;
    --warn:#d97706; --err:#dc2626; --shadow:0 1px 2px #0000000d,0 4px 16px #0000000a;
    --chip:#eef0f3;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0d0f12; --panel:#15181d; --ink:#e7e9ee; --muted:#8a919d;
      --line:#262b33; --accent:#818cf8; --ok:#4ade80; --okbg:#4ade8018;
      --warn:#fbbf24; --err:#f87171; --shadow:0 1px 2px #00000040,0 6px 20px #00000030;
      --chip:#1e232b;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font:15px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:960px; margin:0 auto; padding:1.5rem 1.25rem 4rem}
  header{display:flex; align-items:center; gap:.75rem; flex-wrap:wrap; margin-bottom:1.5rem}
  .brand{display:flex; align-items:baseline; gap:.5rem}
  .brand h1{font-size:1.35rem; margin:0; letter-spacing:-.01em}
  .brand .sub{color:var(--muted); font-size:.9rem}
  .spacer{flex:1}
  .pill{
    display:inline-flex; align-items:center; gap:.45rem; padding:.3rem .7rem;
    border-radius:999px; background:var(--okbg); color:var(--ok);
    font-size:.8rem; font-weight:600; white-space:nowrap;
  }
  .pill.off{background:var(--chip); color:var(--muted)}
  .pill.bad{background:#dc26261a; color:var(--err)}
  .dot{width:8px; height:8px; border-radius:999px; background:currentColor}
  .live .dot{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .updated{color:var(--muted); font-size:.8rem; white-space:nowrap}
  button{
    font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--panel);
    color:var(--ink); padding:.4rem .8rem; border-radius:8px;
  }
  button:hover{border-color:var(--muted)}
  button.primary{background:var(--accent); color:#fff; border-color:transparent; font-weight:600}
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.85rem; margin-bottom:2rem}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:.9rem 1rem; box-shadow:var(--shadow);
  }
  .card .n{font-size:1.9rem; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .card .l{color:var(--muted); font-size:.8rem; margin-top:.15rem}
  section.guild{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow); margin-bottom:1rem; overflow:hidden;
  }
  .ghead{display:flex; align-items:center; gap:.6rem; padding:.9rem 1.1rem; border-bottom:1px solid var(--line)}
  .ghead h2{font-size:1.02rem; margin:0}
  .chip{background:var(--chip); color:var(--muted); font-size:.72rem; padding:.15rem .5rem; border-radius:6px; font-variant-numeric:tabular-nums}
  table{width:100%; border-collapse:collapse}
  th,td{padding:.55rem 1.1rem; text-align:left; border-top:1px solid var(--line)}
  thead th{border-top:none; color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; font-weight:600}
  td.num,th.num{text-align:right; font-variant-numeric:tabular-nums}
  .onl{display:inline-flex; align-items:center; gap:.4rem; font-weight:600}
  .onl .d{width:7px; height:7px; border-radius:999px; background:var(--ok)}
  .onl.zero{color:var(--muted); font-weight:400}
  .onl.zero .d{background:var(--muted); opacity:.5}
  .empty{padding:.8rem 1.1rem; color:var(--muted); font-style:italic}
  footer{margin-top:2rem; color:var(--muted); font-size:.8rem; text-align:center}
  /* login overlay */
  .overlay{position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; padding:1rem}
  .overlay.show{display:flex}
  .login{background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); padding:1.6rem; width:100%; max-width:360px}
  .login h2{margin:.1rem 0 .3rem; font-size:1.1rem}
  .login p{margin:0 0 1rem; color:var(--muted); font-size:.85rem}
  .login input{width:100%; font:inherit; padding:.55rem .7rem; border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--ink); margin-bottom:.7rem}
  .login button{width:100%; justify-content:center}
  .login .err{color:var(--err); font-size:.82rem; min-height:1.2em; margin-top:.5rem}
</style>
</head>
<body>
<div class="wrap" id="app" hidden>
  <header>
    <div class="brand"><h1>UnityLAN</h1><span class="sub">coordinator</span></div>
    <div class="spacer"></div>
    <span class="pill off" id="status"><span class="dot"></span><span id="statusText">connecting</span></span>
    <span class="updated" id="updated"></span>
    <button id="logout">Sign out</button>
  </header>

  <div class="cards" id="cards"></div>
  <div id="guilds"></div>
  <footer id="footer"></footer>
</div>

<div class="overlay" id="overlay">
  <form class="login" id="loginForm">
    <h2>Coordinator admin</h2>
    <p>Enter the admin token from your <code>[admin]</code> config block.</p>
    <input id="tokenInput" type="password" placeholder="admin token" autocomplete="off" autofocus>
    <button class="primary" type="submit">View dashboard</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<script>
const KEY = "ul_admin_token";
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sleep = ms => new Promise(r => setTimeout(r, ms));

let token = localStorage.getItem(KEY);
let running = false;
let lastOk = 0;

const CARDS = [
  ["guilds", "guilds"],
  ["networks", "networks"],
  ["devices_online", "devices online"],
  ["users_online", "users online"],
  ["devices_enrolled", "devices enrolled"],
  ["longpoll_waiters", "long-poll waiters"],
];

function setStatus(cls, text){
  const el = $("#status");
  el.className = "pill " + cls;
  $("#statusText").textContent = text;
}

function render(d){
  const t = d.totals;
  $("#cards").innerHTML = CARDS.map(([k,label]) =>
    `<div class="card"><div class="n">${(t[k]??0).toLocaleString()}</div><div class="l">${label}</div></div>`
  ).join("");

  $("#guilds").innerHTML = d.guilds.map(g => {
    const name = g.name ? esc(g.name) : `<span style="color:var(--muted)">guild ${esc(g.id)}</span>`;
    const rows = g.networks.length ? `
      <table><thead><tr><th>network</th><th>role id</th><th class="num">online</th></tr></thead><tbody>
      ${g.networks.map(n => {
        const z = n.online === 0 ? " zero" : "";
        return `<tr><td>${esc(n.name)}</td><td class="num"><span class="chip">${esc(n.role_id)}</span></td>
          <td class="num"><span class="onl${z}"><span class="d"></span>${n.online.toLocaleString()}</span></td></tr>`;
      }).join("")}
      </tbody></table>` : `<div class="empty">no networks registered</div>`;
    return `<section class="guild"><div class="ghead"><h2>${name}</h2><span class="chip">${esc(g.id)}</span></div>${rows}</section>`;
  }).join("") || `<div class="empty">no guilds yet</div>`;

  $("#footer").textContent = `membership version ${d.version} · control plane only — no peer traffic passes here`;
  lastOk = Date.now();
  tickUpdated();
}

function tickUpdated(){
  if(!lastOk){ $("#updated").textContent = ""; return; }
  const s = Math.round((Date.now() - lastOk) / 1000);
  $("#updated").textContent = s < 2 ? "updated just now" : `updated ${s}s ago`;
}
setInterval(tickUpdated, 1000);

async function loop(){
  running = true;
  let version = null;
  while(running){
    const url = "/admin/stats" + (version != null ? "?since=" + version : "");
    let r;
    try {
      setStatus("live", version == null ? "loading" : "live");
      r = await fetch(url, { headers: { Authorization: "Bearer " + token } });
    } catch(e){
      setStatus("bad", "reconnecting"); await sleep(3000); continue;
    }
    if(r.status === 401){ logout("Invalid token."); return; }
    if(!r.ok){ setStatus("bad", "error " + r.status); await sleep(3000); continue; }
    const d = await r.json();
    version = d.version;
    render(d);
  }
}

function showApp(){ $("#overlay").classList.remove("show"); $("#app").hidden = false; loop(); }
function logout(msg){
  running = false;
  localStorage.removeItem(KEY); token = null;
  $("#app").hidden = true;
  $("#loginErr").textContent = msg || "";
  $("#overlay").classList.add("show");
  $("#tokenInput").value = ""; $("#tokenInput").focus();
}

$("#logout").addEventListener("click", () => logout(""));
$("#loginForm").addEventListener("submit", e => {
  e.preventDefault();
  const v = $("#tokenInput").value.trim();
  if(!v) return;
  token = v; localStorage.setItem(KEY, v);
  showApp();
});

if(token) showApp(); else $("#overlay").classList.add("show");
</script>
</body>
</html>
