<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UnityLAN Coordinator</title>
<style>
  :root{
    color-scheme: light dark;
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1a1c1f; --muted:#6b7280;
    --line:#e5e7eb; --accent:#4f46e5; --ok:#16a34a; --okbg:#16a34a1a;
    --warn:#d97706; --err:#dc2626; --shadow:0 1px 2px #0000000d,0 4px 16px #0000000a;
    --chip:#eef0f3;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0d0f12; --panel:#15181d; --ink:#e7e9ee; --muted:#8a919d;
      --line:#262b33; --accent:#818cf8; --ok:#4ade80; --okbg:#4ade8018;
      --warn:#fbbf24; --err:#f87171; --shadow:0 1px 2px #00000040,0 6px 20px #00000030;
      --chip:#1e232b;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font:15px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:960px; margin:0 auto; padding:1.5rem 1.25rem 4rem}
  header{display:flex; align-items:center; gap:.75rem; flex-wrap:wrap; margin-bottom:1.5rem}
  .brand{display:flex; align-items:baseline; gap:.5rem}
  .brand h1{font-size:1.35rem; margin:0; letter-spacing:-.01em}
  .brand .sub{color:var(--muted); font-size:.9rem}
  .spacer{flex:1}
  .pill{
    display:inline-flex; align-items:center; gap:.45rem; padding:.3rem .7rem;
    border-radius:999px; background:var(--okbg); color:var(--ok);
    font-size:.8rem; font-weight:600; white-space:nowrap;
  }
  .pill.off{background:var(--chip); color:var(--muted)}
  .pill.bad{background:#dc26261a; color:var(--err)}
  .dot{width:8px; height:8px; border-radius:999px; background:currentColor}
  .live .dot{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .updated{color:var(--muted); font-size:.8rem; white-space:nowrap}
  button{
    font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--panel);
    color:var(--ink); padding:.4rem .8rem; border-radius:8px;
  }
  button:hover{border-color:var(--muted)}
  button.primary{background:var(--accent); color:#fff; border-color:transparent; font-weight:600}
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.85rem; margin-bottom:2rem}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:.9rem 1rem; box-shadow:var(--shadow);
  }
  .card .n{font-size:1.9rem; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .card .l{color:var(--muted); font-size:.8rem; margin-top:.15rem}
  section.guild{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow); margin-bottom:1rem; overflow:hidden;
  }
  .ghead{display:flex; align-items:center; gap:.6rem; padding:.9rem 1.1rem; border-bottom:1px solid var(--line)}
  .ghead h2{font-size:1.02rem; margin:0}
  .chip{background:var(--chip); color:var(--muted); font-size:.72rem; padding:.15rem .5rem; border-radius:6px; font-variant-numeric:tabular-nums}
  table{width:100%; border-collapse:collapse}
  th,td{padding:.55rem 1.1rem; text-align:left; border-top:1px solid var(--line)}
  thead th{border-top:none; color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; font-weight:600}
  td.num,th.num{text-align:right; font-variant-numeric:tabular-nums}
  .onl{display:inline-flex; align-items:center; gap:.4rem; font-weight:600}
  .onl .d{width:7px; height:7px; border-radius:999px; background:var(--ok)}
  .onl.zero{color:var(--muted); font-weight:400}
  .onl.zero .d{background:var(--muted); opacity:.5}
  .empty{padding:.8rem 1.1rem; color:var(--muted); font-style:italic}
  footer{margin-top:2rem; color:var(--muted); font-size:.8rem; text-align:center}
  /* network graph */
  section.graph{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow); margin:1.5rem 0 1rem; overflow:hidden;
  }
  .graph .ghead{justify-content:space-between}
  .graph .tools{display:flex; gap:.5rem; align-items:center}
  .graph .tools button{padding:.32rem .65rem; font-size:.83rem}
  .gwrap{position:relative}
  svg#graph{
    display:block; width:100%; height:480px; cursor:grab; touch-action:none;
    background:radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0/22px 22px;
  }
  svg#graph.grabbing{cursor:grabbing}
  #graph text{fill:var(--muted); font-size:9px; pointer-events:none; user-select:none}
  #graph .edge{stroke:var(--line); stroke-width:1}
  #graph .nd{cursor:pointer}
  #graph .user circle{fill:var(--accent); stroke:var(--panel); stroke-width:1.5}
  #graph .net rect{stroke:#00000033; stroke-width:1}
  .gempty{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    color:var(--muted); font-style:italic; pointer-events:none;
  }
  .gempty.show{display:flex}
  .glegend{display:flex; flex-wrap:wrap; gap:.45rem 1rem; padding:.6rem 1.1rem; border-top:1px solid var(--line); font-size:.78rem; color:var(--muted)}
  .glegend .k{display:inline-flex; align-items:center; gap:.35rem}
  .glegend .sw{width:11px; height:11px; border-radius:3px; display:inline-block; flex:none}
  /* login overlay */
  .overlay{position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; padding:1rem}
  .overlay.show{display:flex}
  .login{background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); padding:1.6rem; width:100%; max-width:360px}
  .login h2{margin:.1rem 0 .3rem; font-size:1.1rem}
  .login p{margin:0 0 1rem; color:var(--muted); font-size:.85rem}
  .login input{width:100%; font:inherit; padding:.55rem .7rem; border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--ink); margin-bottom:.7rem}
  .login button{width:100%; justify-content:center}
  .login .err{color:var(--err); font-size:.82rem; min-height:1.2em; margin-top:.5rem}
</style>
</head>
<body>
<div class="wrap" id="app" hidden>
  <header>
    <div class="brand"><h1>UnityLAN</h1><span class="sub">coordinator</span></div>
    <div class="spacer"></div>
    <span class="pill off" id="status"><span class="dot"></span><span id="statusText">connecting</span></span>
    <span class="updated" id="updated"></span>
    <button id="logout">Sign out</button>
  </header>

  <div class="cards" id="cards"></div>

  <section class="graph" id="graphPanel">
    <div class="ghead">
      <h2>Network graph</h2>
      <div class="tools">
        <span class="chip" id="graphCount"></span>
        <button id="graphReset" title="Recenter and fit">Reset view</button>
        <button id="graphDot" title="Download Graphviz DOT">Download .dot</button>
      </div>
    </div>
    <div class="gwrap">
      <svg id="graph"><g id="graphViewport"><g id="graphEdges"></g><g id="graphNodes"></g></g></svg>
      <div class="gempty" id="graphEmpty">no members online</div>
    </div>
    <div class="glegend" id="graphLegend"></div>
  </section>

  <div id="guilds"></div>
  <footer id="footer"></footer>
</div>

<div class="overlay" id="overlay">
  <form class="login" id="loginForm">
    <h2>Coordinator admin</h2>
    <p>Enter the admin token from your <code>[admin]</code> config block.</p>
    <input id="tokenInput" type="password" placeholder="admin token" autocomplete="off" autofocus>
    <button class="primary" type="submit">View dashboard</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<script>
const KEY = "ul_admin_token";
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sleep = ms => new Promise(r => setTimeout(r, ms));

let token = localStorage.getItem(KEY);
let running = false;
let lastOk = 0;

const CARDS = [
  ["guilds", "guilds"],
  ["networks", "networks"],
  ["devices_online", "devices online"],
  ["users_online", "users online"],
  ["devices_enrolled", "devices enrolled"],
  ["longpoll_waiters", "long-poll waiters"],
];

function setStatus(cls, text){
  const el = $("#status");
  el.className = "pill " + cls;
  $("#statusText").textContent = text;
}

function render(d){
  const t = d.totals;
  $("#cards").innerHTML = CARDS.map(([k,label]) =>
    `<div class="card"><div class="n">${(t[k]??0).toLocaleString()}</div><div class="l">${label}</div></div>`
  ).join("");

  $("#guilds").innerHTML = d.guilds.map(g => {
    const name = g.name ? esc(g.name) : `<span style="color:var(--muted)">guild ${esc(g.id)}</span>`;
    const rows = g.networks.length ? `
      <table><thead><tr><th>network</th><th>role id</th><th class="num">online</th></tr></thead><tbody>
      ${g.networks.map(n => {
        const z = n.online === 0 ? " zero" : "";
        return `<tr><td>${esc(n.name)}</td><td class="num"><span class="chip">${esc(n.role_id)}</span></td>
          <td class="num"><span class="onl${z}"><span class="d"></span>${n.online.toLocaleString()}</span></td></tr>`;
      }).join("")}
      </tbody></table>` : `<div class="empty">no networks registered</div>`;
    return `<section class="guild"><div class="ghead"><h2>${name}</h2><span class="chip">${esc(g.id)}</span></div>${rows}</section>`;
  }).join("") || `<div class="empty">no guilds yet</div>`;

  $("#footer").textContent = `membership version ${d.version} · control plane only — no peer traffic passes here`;
  lastOk = Date.now();
  tickUpdated();
}

function tickUpdated(){
  if(!lastOk){ $("#updated").textContent = ""; return; }
  const s = Math.round((Date.now() - lastOk) / 1000);
  $("#updated").textContent = s < 2 ? "updated just now" : `updated ${s}s ago`;
}
setInterval(tickUpdated, 1000);

// ---- network graph: fetched anonymized, laid out with a small force sim, pan/zoom/drag ----
const Graph = (() => {
  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = $("#graph"), vp = $("#graphViewport");
  const eLayer = $("#graphEdges"), nLayer = $("#graphNodes");
  let data = null, nodes = [], links = [], byId = new Map();
  let hue = new Map();                 // guild id -> hue
  let view = {tx:0, ty:0, k:1};
  let anim = null, heat = 0;

  const size = () => ({w: svg.clientWidth || 800, h: 480});
  const el = (n, a) => { const e = document.createElementNS(SVGNS, n); for(const k in a) e.setAttribute(k, a[k]); return e; };
  const guildColor = g => `hsl(${hue.get(g)??210} 55% 55%)`;

  function applyView(){ vp.setAttribute("transform", `translate(${view.tx} ${view.ty}) scale(${view.k})`); }
  // Screen (svg-local px) -> world coords, inverting the viewport transform.
  function toWorld(cx, cy){ const r = svg.getBoundingClientRect(); return {x:(cx-r.left-view.tx)/view.k, y:(cy-r.top-view.ty)/view.k}; }

  function build(d){
    data = d;
    const guilds = d.guilds || [];
    hue = new Map(guilds.map((g,i) => [g, Math.round(360*i/Math.max(1,guilds.length))]));
    // Keep positions of nodes that persist across a refresh, so the layout doesn't jump.
    const prev = byId; byId = new Map();
    const {w,h} = size();
    nodes = d.nodes.map(n => {
      const o = prev.get(n.id);
      const nd = { id:n.id, kind:n.kind, guild:n.guild||null,
        x: o ? o.x : (Math.random()-0.5)*w*0.6, y: o ? o.y : (Math.random()-0.5)*h*0.6,
        vx:0, vy:0, pinned:false };
      byId.set(n.id, nd); return nd;
    });
    links = d.edges.map(e => ({s:byId.get(e.from), t:byId.get(e.to)})).filter(l => l.s && l.t);
    draw();
    renderLegend(guilds);
    $("#graphCount").textContent = `${nodes.filter(n=>n.kind==="user").length} users · ${nodes.filter(n=>n.kind==="network").length} networks`;
    $("#graphEmpty").classList.toggle("show", nodes.length === 0);
    heat = 1; loop();
  }

  // Build SVG elements once per refresh; the sim only moves them.
  function draw(){
    eLayer.textContent = ""; nLayer.textContent = "";
    for(const l of links){ l.el = el("line", {class:"edge"}); eLayer.appendChild(l.el); }
    for(const n of nodes){
      const g = el("g", {class:"nd " + (n.kind==="user"?"user":"net")});
      if(n.kind==="user"){ g.appendChild(el("circle", {r:7})); }
      else { g.appendChild(el("rect", {x:-9,y:-7,width:18,height:14,rx:4, fill:guildColor(n.guild)})); }
      const t = el("text", {x:0, y:-11, "text-anchor":"middle"}); t.textContent = n.id;
      g.appendChild(t);
      g.addEventListener("pointerdown", ev => startNodeDrag(ev, n));
      n.el = g; nLayer.appendChild(g);
    }
    position();
  }

  function position(){
    for(const l of links){ l.el.setAttribute("x1",l.s.x); l.el.setAttribute("y1",l.s.y); l.el.setAttribute("x2",l.t.x); l.el.setAttribute("y2",l.t.y); }
    for(const n of nodes){ n.el.setAttribute("transform", `translate(${n.x} ${n.y})`); }
  }

  // One force step: node-node repulsion, edge springs, gravity toward origin, damping.
  function step(){
    const REP=5200, SPRING=0.02, LEN=95, GRAV=0.006, DAMP=0.85;
    for(let i=0;i<nodes.length;i++){
      const a=nodes[i];
      for(let j=i+1;j<nodes.length;j++){
        const b=nodes[j];
        let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||0.01, d=Math.sqrt(d2), f=REP/d2;
        const fx=f*dx/d, fy=f*dy/d;
        a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
      }
      a.vx-=a.x*GRAV; a.vy-=a.y*GRAV;
    }
    for(const l of links){
      let dx=l.t.x-l.s.x, dy=l.t.y-l.s.y, d=Math.hypot(dx,dy)||0.01, f=SPRING*(d-LEN);
      const fx=f*dx/d, fy=f*dy/d;
      l.s.vx+=fx; l.s.vy+=fy; l.t.vx-=fx; l.t.vy-=fy;
    }
    for(const n of nodes){ if(n.pinned){ n.vx=0; n.vy=0; continue; } n.vx*=DAMP; n.vy*=DAMP; n.x+=n.vx; n.y+=n.vy; }
  }

  function loop(){
    if(anim) return;
    const tick = () => {
      step(); step(); position();
      heat *= 0.985;
      if(heat > 0.02) anim = requestAnimationFrame(tick);
      else { anim = null; }
    };
    anim = requestAnimationFrame(tick);
  }
  const reheat = () => { heat = Math.max(heat, 0.6); loop(); };

  function renderLegend(guilds){
    const parts = [
      `<span class="k"><span class="sw" style="background:var(--accent)"></span>user</span>`,
      ...guilds.map(g => `<span class="k"><span class="sw" style="background:${guildColor(g)}"></span>${esc(g)}</span>`),
    ];
    $("#graphLegend").innerHTML = guilds.length ? parts.join("") : "";
  }

  // Fit all nodes into the viewport (also the initial + reset view).
  function fit(){
    const {w,h} = size();
    if(!nodes.length){ view={tx:w/2, ty:h/2, k:1}; applyView(); return; }
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    for(const n of nodes){ x0=Math.min(x0,n.x); y0=Math.min(y0,n.y); x1=Math.max(x1,n.x); y1=Math.max(y1,n.y); }
    const pad=50, bw=(x1-x0)||1, bh=(y1-y0)||1;
    const k=Math.min(3, Math.max(0.2, Math.min((w-2*pad)/bw, (h-2*pad)/bh)));
    view={ k, tx: w/2 - k*(x0+x1)/2, ty: h/2 - k*(y0+y1)/2 };
    applyView();
  }

  // ---- interaction: wheel zoom (about cursor), background pan, node drag ----
  svg.addEventListener("wheel", ev => {
    ev.preventDefault();
    const r=svg.getBoundingClientRect(), sx=ev.clientX-r.left, sy=ev.clientY-r.top;
    const f=Math.exp(-ev.deltaY*0.0015), nk=Math.min(4, Math.max(0.15, view.k*f));
    view.tx = sx - (sx-view.tx)*(nk/view.k); view.ty = sy - (sy-view.ty)*(nk/view.k); view.k = nk;
    applyView();
  }, {passive:false});

  let pan=null;
  svg.addEventListener("pointerdown", ev => {
    if(ev.target.closest(".nd")) return;      // node drag handles its own
    pan={x:ev.clientX, y:ev.clientY, tx:view.tx, ty:view.ty};
    svg.classList.add("grabbing"); svg.setPointerCapture(ev.pointerId);
  });
  svg.addEventListener("pointermove", ev => {
    if(!pan) return;
    view.tx = pan.tx + (ev.clientX-pan.x); view.ty = pan.ty + (ev.clientY-pan.y); applyView();
  });
  const endPan = () => { pan=null; svg.classList.remove("grabbing"); };
  svg.addEventListener("pointerup", endPan); svg.addEventListener("pointercancel", endPan);

  let drag=null;
  function startNodeDrag(ev, n){
    ev.stopPropagation();
    n.pinned=true; drag={n, id:ev.pointerId};
    svg.setPointerCapture(ev.pointerId);
    const move = e => { const w=toWorld(e.clientX, e.clientY); n.x=w.x; n.y=w.y; position(); reheat(); };
    const up = () => { n.pinned=false; svg.removeEventListener("pointermove", move); svg.removeEventListener("pointerup", up); reheat(); };
    svg.addEventListener("pointermove", move); svg.addEventListener("pointerup", up);
  }

  // ---- Graphviz DOT export (built from the already-anonymized data) ----
  function toDot(){
    if(!data) return "graph unitylan {}\n";
    const safe = s => s.replace(/[^A-Za-z0-9_]/g, "_");
    let s = "graph unitylan {\n  graph [layout=neato, overlap=false, splines=true];\n  node [fontsize=10, fontname=\"sans-serif\"];\n\n";
    const byGuild = new Map();
    for(const n of data.nodes) if(n.kind==="network"){ if(!byGuild.has(n.guild)) byGuild.set(n.guild, []); byGuild.get(n.guild).push(n.id); }
    for(const [g,list] of byGuild){
      s += `  subgraph cluster_${safe(g)} {\n    label="${g}"; style="rounded"; color="#8888aa";\n`;
      for(const id of list) s += `    "${id}" [shape=box, style="rounded,filled", fillcolor="#dbe4ff"];\n`;
      s += "  }\n";
    }
    for(const n of data.nodes) if(n.kind==="user") s += `  "${n.id}" [shape=ellipse];\n`;
    for(const e of data.edges) s += `  "${e.from}" -- "${e.to}";\n`;
    return s + "}\n";
  }
  function download(){
    const blob = new Blob([toDot()], {type:"text/vnd.graphviz"});
    const url = URL.createObjectURL(blob), a = document.createElement("a");
    a.href = url; a.download = "unitylan-network.dot"; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  $("#graphReset").addEventListener("click", fit);
  $("#graphDot").addEventListener("click", download);
  window.addEventListener("resize", applyView);

  let loaded = null;   // version last drawn, so we refetch only on a real membership change
  async function refresh(version){
    if(!token || version === loaded) return;
    try {
      const r = await fetch("/admin/graph", { headers: { Authorization: "Bearer " + token } });
      if(!r.ok) return;
      const d = await r.json();
      const first = loaded === null;
      loaded = version;
      build(d);
      if(first) fit();
    } catch(e){ /* transient — the stats loop will trigger another refresh */ }
  }
  function reset(){ loaded=null; byId=new Map(); }

  return { refresh, reset };
})();

async function loop(){
  running = true;
  let version = null;
  while(running){
    const url = "/admin/stats" + (version != null ? "?since=" + version : "");
    let r;
    try {
      setStatus("live", version == null ? "loading" : "live");
      r = await fetch(url, { headers: { Authorization: "Bearer " + token } });
    } catch(e){
      setStatus("bad", "reconnecting"); await sleep(3000); continue;
    }
    if(r.status === 401){ logout("Invalid token."); return; }
    if(!r.ok){ setStatus("bad", "error " + r.status); await sleep(3000); continue; }
    const d = await r.json();
    version = d.version;
    render(d);
    Graph.refresh(version);
  }
}

function showApp(){ $("#overlay").classList.remove("show"); $("#app").hidden = false; loop(); }
function logout(msg){
  running = false;
  Graph.reset();
  localStorage.removeItem(KEY); token = null;
  $("#app").hidden = true;
  $("#loginErr").textContent = msg || "";
  $("#overlay").classList.add("show");
  $("#tokenInput").value = ""; $("#tokenInput").focus();
}

$("#logout").addEventListener("click", () => logout(""));
$("#loginForm").addEventListener("submit", e => {
  e.preventDefault();
  const v = $("#tokenInput").value.trim();
  if(!v) return;
  token = v; localStorage.setItem(KEY, v);
  showApp();
});

if(token) showApp(); else $("#overlay").classList.add("show");
</script>
</body>
</html>
