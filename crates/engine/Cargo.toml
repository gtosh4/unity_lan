[package]
name = "unitylan-engine"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "unitylan-engine"
path = "src/main.rs"

[dependencies]
unitylan-common.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
toml.workspace = true

reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
defguard_wireguard_rs = "0.10.0"
igd-next = { version = "0.17", features = ["aio_tokio"] }
interprocess = { version = "2.4.2", features = ["tokio"] }
base64 = "0.22"
hickory-proto = "0.26.1"

[target.'cfg(unix)'.dependencies]
# Resolve `control_group` (name → gid) to own the control socket root:<group>.
libc = "0.2"
