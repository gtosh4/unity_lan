<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="340" height="100" role="img" aria-label="UnityLAN">
  <style>
    .wm { font-family: "Segoe UI", ui-sans-serif, system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
          font-weight: 700; font-size: 46px; letter-spacing: -0.5px; }
    .u { fill: #5865F2; }            /* "Unity" — blurple */
    .l { fill: #1b1c24; }            /* "LAN"  — ink, theme-aware below */
