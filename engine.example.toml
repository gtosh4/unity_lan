# Engine config. Copy to engine.toml and edit.

coordinator = "http://127.0.0.1:8080"
state_dir = "engine-state"

# The `.unity.internal` resolver (name resolution for `<device>.<user>.unity.internal`) listens on
# this device's own mesh IP, port 53. On by default; set false to reach peers by IP.
# dns = false

# Enrollment: bind this device to its owner via a one-time key (minted by `/unitylan enroll`, or
# seeded in the coordinator's [[enroll]] block for local dev). The key is single-use and short-lived
# (~15 min). Alternatively, pass it once on the command line with `--token <key>` to keep the bearer
# secret off disk, or omit it and run `unitylan-engine login engine.toml` for interactive Discord login.
# enrollment_key = "dev-key-1"

# Interactive-login (Discord PKCE) loopback redirect. Defaults to this if omitted; register the
# exact URL with the Discord app. Being loopback, it works from any host/VM regardless of LAN IP.
# oauth_redirect = "http://127.0.0.1:8765/callback"

# Default peering posture for networks discovered from now on. true (secure default) opts a
# newly-seen network out of peering until you enable it in the GUI; false auto-enrols new networks.
# Seeds the initial policy on first run; the GUI toggle is the source of truth thereafter.
# disable_new_networks = true

# Peer-direct attestation refresh (docs/gossip-refresh.md). On by default: the engine keeps peers'
# attestations fresh directly over the tunnels and drops a peer whose attestation lapses with no
# source, so revocation survives a coordinator outage. The coordinator stays the fallback. Set false
# to revert to coordinator-only refresh + coordinator-snapshot revocation.
# gossip = false
