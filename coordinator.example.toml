# Coordinator config. Copy to coordinator.toml (real creds) or coordinator.test.toml (fake).
# A coordinator can serve multiple guilds. Networks are normally managed via the
# `/unitylan network` slash commands; the [[network]] seeds below are a test convenience.

bind = "127.0.0.1:8080"
database = "coordinator.db"

# --- Behind a TLS-terminating reverse proxy (Caddy, nginx) ---
# REQUIRED if you run one. The rate limiter buckets by source IP, and a same-host proxy makes every
# request arrive from loopback — so without this the whole deployment shares ONE bucket and the
# per-IP cap (30/s) throttles all your clients together. Listing the proxy makes the limiter read the
# real client from X-Forwarded-For (which Caddy sets automatically).
# Only list proxies you control: an unlisted peer's X-Forwarded-For is ignored, because a header any
# caller can set would otherwise let them forge a fresh bucket per request and bypass the limiter.
# trusted_proxies = ["127.0.0.1/32", "::1/128"]

# Global ceiling for simultaneously held client long-polls. A device may hold only one regardless;
# this protects coordinator and proxy fd/memory capacity. Default 4096. Set both services' open-file
# limits above this value, with headroom for SQLite, Discord, admin, and ordinary connections.
# max_longpolls = 4096

# Attestation lifetime (seconds) = the revocation window: a member who loses a role keeps mesh
# access until their last attestation expires. The client renewal/gossip cadence and the long-poll
# hold derive from it. Shorter = tighter revocation, more refresh churn. Default 1800 (30 min).
# attestation_ttl_secs = 1800

# --- Admin dashboard + Prometheus /metrics (optional, opt-in) ---
# Set a token to enable the operator monitoring surface: a browser dashboard at /admin and a
# Prometheus endpoint at /metrics (both bearer-gated by this token; absent = both return 404).
# Generate a long random secret, e.g. `openssl rand -hex 32`. See docs/coordinator-setup.md.
#
# [admin]
# token = "<long-random-secret>"

# --- Live source: real Discord + OAuth (see docs/coordinator-setup.md) ---
# Uncomment these two blocks (and delete the [fake...] / [[network]] seeds below) for a live
# deployment. The engine is a public PKCE client, so the [oauth] block holds only the public
# client_id — no client_secret, no redirect (the engine owns the loopback redirect).
#
# [discord]
# bot_token = "<your bot token>"
#
# [oauth]
# client_id = "<your app client id>"

# --- Offline dev source: fake Discord, no bot/OAuth/network needed ---
[[fake.guild]]
id = 111
name = "My Community"
[[fake.guild.member]]
user_id = 333
nick = "Alice"
role_ids = [222, 223]

[[network]]
guild_id = 111
role_id = 222
name = "Minecraft SMP"

# --- Signed auto-update (optional, opt-in) ---
# When present, the coordinator signs this manifest with its trust anchor and advertises it to
# clients on the long-poll. A client verifies it against its pinned anchor, and if `version` is
# newer than what it runs and there's an artifact for its platform, offers an in-GUI Update button
# that downloads the artifact, re-checks the SHA-256, swaps the binary / runs the MSI, and restarts.
# Fill this in per release from the GitHub Release assets + their SHA256SUMS. Omit it entirely to
# disable auto-update (clients then only see a "newer version exists" notice, no button).
#
# To publish a new release without a restart, edit this block and send SIGHUP: `kill -HUP <pid>`
# (Docker: `docker kill -s HUP <container>`). The coordinator re-signs and serves it immediately;
# a malformed edit is logged and the previous manifest is kept. (Other config still needs a restart.)
#
# [release]
# version = "0.2.0"
#
# [[release.artifact]]
# platform = "linux-amd64"                       # raw `unitylan-engine` binary (self-replaced in place)
# url = "https://github.com/gtosh4/unity_lan/releases/download/v0.2.0/unitylan-engine-linux-amd64"
# sha256 = "<64-hex from SHA256SUMS>"
# size = 12345678
#
# [[release.artifact]]
# platform = "windows-amd64"                     # the .msi (MSI MajorUpgrade replaces engine+gui+dll)
# url = "https://github.com/gtosh4/unity_lan/releases/download/v0.2.0/unitylan-0.2.0-x64.msi"
# sha256 = "<64-hex from SHA256SUMS-windows.txt>"
# size = 23456789
