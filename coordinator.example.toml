# Coordinator config. Copy to coordinator.toml (real creds) or coordinator.test.toml (fake).
# A coordinator can serve multiple guilds. Networks are normally managed via the
# `/unitylan network` slash commands; the [[network]] seeds below are a test convenience.

bind = "127.0.0.1:8080"
database = "coordinator.db"

